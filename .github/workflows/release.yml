name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # 手动触发：本地上传 macOS 产物后，重新生成 latest-zh.json + latest-en.json
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag 名称（如 v0.1.0），用于重新生成 latest-*.json"
        required: true

# 同一时间只允许一个 release 流程（不取消进行中的构建，排队等待）
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── 1. 预热 NER 模型缓存（按语言分别缓存） ──
  prepare-model:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: zh
            model: chinese
            cache_key: ner-model-chinese-bert4ner-v1
          - lang: en
            model: distilbert-ner
            cache_key: ner-model-dslim-distilbert-ner-v1
    steps:
      - uses: actions/checkout@v4

      - name: 缓存 NER 模型（${{ matrix.lang }}）
        id: cache-model
        uses: actions/cache@v4
        with:
          path: .ner_cache/${{ matrix.model }}
          key: ${{ matrix.cache_key }}
          enableCrossOsArchive: true

      - name: 设置 Python
        if: steps.cache-model.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 下载并导出 NER 模型（${{ matrix.lang }}）
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install optimum[onnxruntime] transformers torch huggingface_hub
          python scripts/export_ner_model.py ${{ matrix.model }}

  # ── 2. Windows 自动构建（macOS 由本地构建后手动上传），按语言矩阵 ──
  build:
    if: github.event_name == 'push'
    needs: prepare-model
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            lang: zh
            model: chinese
            cache_key: ner-model-chinese-bert4ner-v1
            bundle_ident: com.dimkey.cn
            updater_endpoint: https://dimkey.com/latest-zh.json
            default_features: '["lang-zh"]'
          - platform: windows-latest
            lang: en
            model: distilbert-ner
            cache_key: ner-model-dslim-distilbert-ner-v1
            bundle_ident: com.dimkey.en
            updater_endpoint: https://dimkey.com/latest-en.json
            default_features: '["lang-en"]'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: License preflight 校验（lang=zh 阶段）
        if: matrix.lang == 'zh'
        shell: bash
        run: |
          chmod +x scripts/preflight-license.sh
          ./scripts/preflight-license.sh

      - name: 恢复 NER 模型缓存（${{ matrix.lang }}）
        uses: actions/cache/restore@v4
        with:
          path: .ner_cache/${{ matrix.model }}
          key: ${{ matrix.cache_key }}
          enableCrossOsArchive: true

      - name: 激活 NER 模型到 src-tauri/resources/ner/
        shell: bash
        run: |
          # use_ner_model.sh 会从 .ner_cache/${{ matrix.model }} 同步到 resources/ner/
          # 缓存命中时跳过 Python 导出，仅做 rsync
          PYTHON_BIN=python bash scripts/use_ner_model.sh ${{ matrix.model }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.lang }}

      - name: 安装前端依赖
        run: npm ci

      - name: 临时改写 tauri.conf.json 和 Cargo.toml（按 ${{ matrix.lang }}）
        shell: bash
        run: |
          set -euo pipefail
          # tauri.conf.json：identifier + updater endpoint
          jq --arg id '${{ matrix.bundle_ident }}' \
             --arg endpoint '${{ matrix.updater_endpoint }}' \
             '.identifier = $id | .plugins.updater.endpoints = [$endpoint]' \
             src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          # Cargo.toml：default features
          # 用 sed 替换 [features] 段下的 default = [...] 行（GNU sed in linux/win runner）
          sed -i 's/^default = \["lang-[a-z]*"\]$/default = ${{ matrix.default_features }}/' src-tauri/Cargo.toml

          echo "=== 改写后 identifier ==="
          jq -r '.identifier' src-tauri/tauri.conf.json
          echo "=== 改写后 updater endpoint ==="
          jq -r '.plugins.updater.endpoints[0]' src-tauri/tauri.conf.json
          echo "=== 改写后 default features ==="
          grep '^default = ' src-tauri/Cargo.toml

      - name: 构建 Tauri 应用（${{ matrix.lang }}）
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_DIMKEY_LANG: ${{ matrix.lang }}
        run: |
          # 用 npm ci 装好的项目锁定版本（package.json devDependencies 中的 @tauri-apps/cli ^2）
          npx tauri build

      - name: 重命名 Windows 产物加 lang 后缀
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle"
          LANG_TAG="${{ matrix.lang }}"

          shopt -s nullglob
          # 重命名 NSIS 相关产物：Dimkey_X.Y.Z_x64-setup.{exe,nsis.zip,nsis.zip.sig}
          for f in "$BUNDLE_DIR/nsis"/Dimkey_*-setup.exe \
                   "$BUNDLE_DIR/nsis"/Dimkey_*-setup.nsis.zip \
                   "$BUNDLE_DIR/nsis"/Dimkey_*-setup.nsis.zip.sig; do
            [ -f "$f" ] || continue
            new="$(dirname "$f")/$(basename "$f" | sed "s/^Dimkey_/Dimkey-${LANG_TAG}_/")"
            mv "$f" "$new"
            echo "重命名: $(basename "$f") → $(basename "$new")"
          done

          ls -la "$BUNDLE_DIR/nsis/" 2>/dev/null || true

      - name: 上传产物到私有仓库 Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          LANG_TAG="${{ matrix.lang }}"

          # 确保 Release 存在
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "Dimkey $TAG" \
              --notes "请查看 [更新日志](https://github.com/cube1/dimkey/blob/main/CHANGELOG.md) 了解详细变更。"
          fi

          shopt -s nullglob
          FILES=()
          while IFS= read -r -d '' f; do
            FILES+=("$f")
          done < <(find src-tauri/target -type f \( \
            -name "Dimkey-${LANG_TAG}_*-setup.exe" -o \
            -name "Dimkey-${LANG_TAG}_*-setup.nsis.zip" -o \
            -name "Dimkey-${LANG_TAG}_*-setup.nsis.zip.sig" \
          \) -print0 2>/dev/null)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "未找到 ${LANG_TAG} 产物，跳过上传"
            exit 0
          fi
          for f in "${FILES[@]}"; do
            echo "上传 $(basename "$f")..."
            gh release upload "$TAG" "$f" --clobber
          done

      - name: 同步产物到公开仓库 dimkey-site
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          SITE_REPO="cube1/dimkey-site"
          TAG="${{ github.ref_name }}"
          LANG_TAG="${{ matrix.lang }}"

          if ! gh release view "$TAG" --repo "$SITE_REPO" 2>/dev/null; then
            gh release create "$TAG" --repo "$SITE_REPO" \
              --title "Dimkey $TAG" \
              --notes "请查看 [更新日志](https://dimkey.com) 了解详细变更。"
          fi

          shopt -s nullglob
          FILES=()
          while IFS= read -r -d '' f; do
            FILES+=("$f")
          done < <(find src-tauri/target -type f \( \
            -name "Dimkey-${LANG_TAG}_*-setup.exe" -o \
            -name "Dimkey-${LANG_TAG}_*-setup.nsis.zip" -o \
            -name "Dimkey-${LANG_TAG}_*-setup.nsis.zip.sig" \
          \) -print0 2>/dev/null)

          for f in "${FILES[@]}"; do
            echo "同步 $(basename "$f") → $SITE_REPO..."
            gh release upload "$TAG" "$f" --clobber --repo "$SITE_REPO"
          done

  # ── 3. 生成更新元数据 latest-zh.json + latest-en.json ──
  generate-updater-json:
    needs: build
    if: >-
      always() && (
        needs.build.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && needs.build.result == 'skipped')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: 下载更新包签名文件
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${TAG_NAME}" \
            --dir release-assets \
            --repo "${{ github.repository }}" \
            --pattern "Dimkey-*.tar.gz.sig" \
            --pattern "Dimkey-*.nsis.zip.sig" \
            || true
          echo "=== 已下载的签名文件 ==="
          ls -la release-assets/ || true

      - name: 下载双语 release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${TAG_NAME}" \
            --dir release-assets \
            --repo "${{ github.repository }}" \
            --pattern "dimkey-release-notes-*.md" \
            || true
          echo "=== 下载到的 notes 文件 ==="
          ls -la release-assets/dimkey-release-notes-*.md 2>/dev/null || echo "（无）"

      - name: 生成 latest-zh.json 和 latest-en.json
        run: |
          set -euo pipefail
          SITE_REPO="cube1/dimkey-site"
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          for LANG in zh en; do
            PLATFORMS="{}"

            # macOS aarch64
            SIG_FILE=$(ls release-assets/Dimkey-${LANG}_*.app.tar.gz.sig 2>/dev/null | head -1)
            if [ -n "$SIG_FILE" ]; then
              SIG=$(cat "$SIG_FILE")
              BUNDLE=$(basename "${SIG_FILE%.sig}")
              URL="https://github.com/${SITE_REPO}/releases/download/${TAG_NAME}/${BUNDLE}"
              PLATFORMS=$(echo "$PLATFORMS" | jq \
                --arg sig "$SIG" --arg url "$URL" \
                '. + {"darwin-aarch64": {signature: $sig, url: $url}}')
            fi

            # Windows x86_64 (NSIS)
            SIG_FILE=$(ls release-assets/Dimkey-${LANG}_*-setup.nsis.zip.sig 2>/dev/null | head -1)
            if [ -n "$SIG_FILE" ]; then
              SIG=$(cat "$SIG_FILE")
              BUNDLE=$(basename "${SIG_FILE%.sig}")
              URL="https://github.com/${SITE_REPO}/releases/download/${TAG_NAME}/${BUNDLE}"
              PLATFORMS=$(echo "$PLATFORMS" | jq \
                --arg sig "$SIG" --arg url "$URL" \
                '. + {"windows-x86_64": {signature: $sig, url: $url}}')
            fi

            if [ "$PLATFORMS" = "{}" ]; then
              echo "::warning::未找到 ${LANG} 平台签名文件，跳过 latest-${LANG}.json 生成"
              continue
            fi

            # 按 lang 选 notes 文件
            NOTES_FILE="release-assets/dimkey-release-notes-${TAG_NAME}.${LANG}.md"
            if [ -s "$NOTES_FILE" ]; then
              NOTES=$(cat "$NOTES_FILE")
            elif [ "$LANG" = "en" ]; then
              NOTES="See https://dimkey.com/releases/${TAG_NAME} for changelog."
            else
              NOTES="请查看 https://dimkey.com 了解详细变更。"
            fi

            jq -n \
              --arg version "$VERSION" \
              --arg pub_date "$PUB_DATE" \
              --arg notes "$NOTES" \
              --argjson platforms "$PLATFORMS" \
              '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
              > "latest-${LANG}.json"

            echo "=== latest-${LANG}.json ==="
            cat "latest-${LANG}.json"
          done

      - name: 兼容旧版 updater — 复制 latest-zh.json 为 latest.json
        run: |
          # v0.7.0 及之前的客户端 updater endpoint 是 https://dimkey.com/latest.json
          # 新版本（v0.7.1+）endpoint 已经分流到 latest-zh.json / latest-en.json
          # 为了让老用户能收到至少一次升级提示，保留 latest.json 指向中文版
          if [ -f latest-zh.json ]; then
            cp latest-zh.json latest.json
            echo "兼容文件: latest.json = latest-zh.json"
          fi

      - name: 上传 latest-*.json 到私有仓库 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in latest-zh.json latest-en.json latest.json; do
            [ -f "$f" ] || continue
            gh release upload "${TAG_NAME}" "$f" \
              --clobber --repo "${{ github.repository }}"
          done

      - name: 同步 latest-*.json 到 dimkey-site（GitHub Pages）
        env:
          GH_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          SITE_REPO="cube1/dimkey-site"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${SITE_REPO}.git" dimkey-site-repo

          for f in latest-zh.json latest-en.json latest.json; do
            [ -f "$f" ] || continue
            cp "$f" "dimkey-site-repo/$f"
          done

          cd dimkey-site-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-*.json latest.json 2>/dev/null || git add latest-*.json
          if git diff --cached --quiet; then
            echo "latest 元数据无变化，跳过提交"
          else
            git commit -m "chore: 更新 latest-{zh,en}.json + 兼容 latest.json (${TAG_NAME})"
            git push
            echo "latest 元数据已同步到 ${SITE_REPO}"
          fi
